<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>عشوائي | Random Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, 'Cairo', 'Tahoma', sans-serif;
            padding: 1.5rem;
        }

        .card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem 1.8rem 2.5rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E0E7FF, #A5F3FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.4rem;
        }

        .sub {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed #2d3a5e;
            display: inline-block;
            padding-bottom: 6px;
        }

        .result-box {
            background: #030712aa;
            border-radius: 2rem;
            padding: 2rem 1rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(71, 125, 255, 0.3);
            box-shadow: inset 0 2px 5px #00000020, 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #randomValue {
            font-size: 3.2rem;
            font-weight: 800;
            color: #facc15;
            text-shadow: 0 0 6px #ffb34760;
            word-break: break-word;
            line-height: 1.3;
            transition: 0.1s ease;
        }

        .type-badge {
            background: #1e2a44;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b9c8ff;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 1.8rem 0 1rem;
        }

        button {
            background: #1f2a48;
            border: none;
            padding: 0.8rem 1.4rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #eef5ff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px #00000030;
            border: 0.5px solid #3e4b6b;
        }

        button i {
            font-style: normal;
            font-weight: 700;
            font-size: 1.2rem;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(110deg, #3b4e7a, #1f3a6b);
            box-shadow: 0 6px 14px #00000040;
            border: 1px solid #6282d4;
        }

        .btn-primary:hover {
            background: #2f4570;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #5c72a3;
        }

        footer {
            font-size: 0.7rem;
            color: #4b556b;
            margin-top: 1.5rem;
            border-top: 0.5px solid #253353;
            padding-top: 1rem;
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            #randomValue { font-size: 2rem; }
            button { padding: 0.6rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎲 عشوائيات</h1>
    <div class="sub">Rand-o-Matic</div>

    <div class="result-box">
        <div id="randomValue">—</div>
        <div class="type-badge" id="typeLabel">اضغط زراً</div>
    </div>

    <div class="controls">
        <button class="btn-primary" id="randomNumberBtn">🔢 رقم عشوائي</button>
        <button id="randomColorBtn">🎨 لون عشوائي</button>
        <button id="randomEmojiBtn">😀 إيموجي عشوائي</button>
    </div>

    <div class="controls">
        <button id="randomNameBtn" class="btn-outline">👤 اسم عشوائي</button>
        <button id="randomBoolBtn" class="btn-outline">⚖️ صح/خطأ</button>
        <button id="randomCoinBtn" class="btn-outline">🪙 رمي قطعة</button>
    </div>

    <footer>
        ✨ كل نقرة تجلب شيئاً مختلفاً — عشوائي حقيقي (Math.random)
    </footer>
</div>

<script>
    (function() {
        // عناصر DOM
        const randomValueEl = document.getElementById('randomValue');
        const typeLabel = document.getElementById('typeLabel');

        // قوائم سريعة
        const emojiList = ['😀', '😂', '🥳', '🤯', '😎', '🥶', '🔥', '💀', '👾', '🎃', '🤖', '🐉', '🍕', '⚡', '❤️', '💎', '🌈', '⭐', '🍀', '🎲'];
        const nameList = ['ليث', 'ميار', 'يوسف', 'جودي', 'آدم', 'سلطان', 'كارما', 'زين', 'ريم', 'فهد', 'أميرة', 'سيف', 'نور', 'تيم', 'لانا', 'مالك'];

        // دوال مساعدة
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomHexColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function updateDisplay(value, typeText) {
            randomValueEl.innerText = value;
            typeLabel.innerText = typeText;
            // إضافة تأثير اهتزاز خفيف (اختياري بصري)
            randomValueEl.style.transform = 'scale(1.02)';
            setTimeout(() => { randomValueEl.style.transform = 'scale(1)'; }, 120);
        }

        // 1. رقم عشوائي (بين 0 و 10000  وأحياناً أرقام ممتعة)
        function showRandomNumber() {
            let mode = getRandomInt(1, 4);
            let numberVal;
            let desc = '';
            if(mode === 1) numberVal = getRandomInt(1, 100);
            else if(mode === 2) numberVal = getRandomInt(100, 999);
            else if(mode === 3) numberVal = getRandomInt(1000, 9999);
            else numberVal = Math.floor(Math.random() * 100000);
            
            desc = `عدد عشوائي • ${numberVal}`;
            updateDisplay(numberVal, '🔢 رقم عشوائي (0-99999)');
        }

        // 2. لون عشوائي (hex + عرض اللون خلف البطاقة الصغيرة)
        function showRandomColor() {
            const color = randomHexColor();
            updateDisplay(color, '🎨 لون HEX عشوائي');
            // تأثير مؤقت على خلفية الـ result-box
            const box = document.querySelector('.result-box');
            const oldBg = box.style.backgroundColor;
            box.style.transition = '0.2s';
            box.style.backgroundColor = color + '40';
            setTimeout(() => { box.style.backgroundColor = ''; }, 400);
            // عرض لون النص في القيمة بشكل مرح
            randomValueEl.style.color = color;
            setTimeout(() => { randomValueEl.style.color = '#facc15'; }, 800);
        }

        // 3. إيموجي عشوائي
        function showRandomEmoji() {
            const randomEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
            updateDisplay(randomEmoji, '😜 إيموجي عشوائي');
        }

        // 4. اسم عشوائي
        function showRandomName() {
            const randomName = nameList[Math.floor(Math.random() * nameList.length)];
            updateDisplay(randomName, '👤 اسم شخصي عشوائي');
        }

        // 5. صح/خطأ (boolean)
        function showRandomBoolean() {
            const boolVal = Math.random() < 0.5;
            const displayText = boolVal ? '✅ صحيح (True)' : '❌ خطأ (False)';
            updateDisplay(displayText, '⚖️ قيمة منطقية عشوائية');
        }

        // 6. رمي قطعة (وجه / كتابة) بشكل عربي
        function showCoinFlip() {
            const isHeads = Math.random() < 0.5;
            const result = isHeads ? '🇸🇦  رأس (وجه)' : '💠  كتابة (نقش)';
            updateDisplay(result, '🪙 عملة معدنية');
        }

        // ربط الأزرار
        document.getElementById('randomNumberBtn').addEventListener('click', showRandomNumber);
        document.getElementById('randomColorBtn').addEventListener('click', showRandomColor);
        document.getElementById('randomEmojiBtn').addEventListener('click', showRandomEmoji);
        document.getElementById('randomNameBtn').addEventListener('click', showRandomName);
        document.getElementById('randomBoolBtn').addEventListener('click', showRandomBoolean);
        document.getElementById('randomCoinBtn').addEventListener('click', showCoinFlip);

        // عند تحميل الصفحة قم بعرض شيء عشوائي تلقائي welcome
        showRandomNumber();
    })();
</script>
</body>
</html>
