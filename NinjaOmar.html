<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NinjaOmar - تحميل اللعبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .ninja-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        .ninja-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid gold;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            margin-bottom: 20px;
            background: #1e293b;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
            letter-spacing: 2px;
        }

        .year {
            display: inline-block;
            background: #ff5722;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* قسم الصورة الرئيسية */
        .main-img-section {
            margin-bottom: 30px;
        }

        .img-placeholder {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 2px dashed gold;
            color: #aaa;
        }

        .download-btn {
            display: block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0f1e;
            text-align: center;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            text-decoration: none;
            margin: 25px 0;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(255,140,0,0.4);
            border: none;
            cursor: pointer;
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .note {
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 20px;
        }

        code {
            background: #00000066;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 10px;
        }

        hr {
            border-color: #ffd70033;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- البطاقة الرئيسية -->
    <div class="ninja-card">
        <!-- مكان صورة النينجا الرئيسية -->
        <div class="main-img-section">
            <div class="img-placeholder" id="mainImgPlace">
                اشترك في قناة
                <br><code>@ItzYsoYT</code>
            </div>
        </div>
        
        <div class="game-title">⚡ NinjaOmar ⚡</div>
        <div class="year">إصدار 2022</div>
        <p style="margin-top: 15px;">النينجا الأسطوري | قف، اقتل، واختفِ في الظلال</p>
    </div>

    <!-- زر التحميل -->
    <a href="#" class="download-btn" id="downloadLink">
        ⬇️ تحميل لعبة NinjaOmar ⬇️
    </a>
    
    <div class="note">
        📁 رابط التحميل 👆<br>
        <code>شكرا لك لدخولك الموقع الرسمي</code>
    </div>

</div>

<script>
    // ==============================================
    // هنا تحط صورة النينجا الرئيسية
    // ==============================================
    const mainImgPlace = document.getElementById('mainImgPlace');
    // غير "رابط_صورتك.jpg" إلى رابط الصورة الحقيقي
    mainImgPlace.innerHTML = '<img src="../images/photo.jpg" style="width:100%; height:auto; max-height:200px; object-fit:cover; border-radius:15px;">';
    
    // ==============================================
    // رابط تحميل اللعبة - غير الرابط هنا
    // ==============================================
    document.getElementById('downloadLink').href ="gameman.jpg" download="gameman.jpg">
    // مثال: "https://example.com/NinjaOmar.apk" أو "NinjaOmar.a
    
    console.log("NinjaOmar - جاهز لإضافة الصور");
</script>

</body>
</html>
